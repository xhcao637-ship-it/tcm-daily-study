name: TCM Daily Study

on:
  schedule:
    - cron: '0 23 * * *'  # 每天北京时间早上7点 (UTC 23:00)
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build slug cache if missing
        run: |
          if [ ! -f slug_cache.json ]; then
            python build_cache.py
          fi

      - name: Classify next batch of herbs
        run: python build_cache.py

      - name: Generate TCM daily report
        run: python scrape_tcm.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ README.md history.json slug_cache.json
          git diff --cached --quiet || git commit -m "docs: 每日中医学习报告 $(date -u +%Y-%m-%d)"
          git push
